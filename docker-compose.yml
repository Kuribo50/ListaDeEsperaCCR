services:
  db:
    image: postgres:16
    container_name: ccr-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: ccr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: ccr-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DB_ENGINE: postgres
      DJANGO_CACHE_BACKEND: redis
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             (python manage.py loaddata fixtures/initial_data.json || true) &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: ccr-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: ccr-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_media:/app/media:ro
      - backend_static:/app/staticfiles:ro

volumes:
  postgres_data:
  backend_media:
  backend_static:
