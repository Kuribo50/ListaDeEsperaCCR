services:
  db:
    image: postgres:16
    container_name: ccr-db-prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ccr-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
    container_name: ccr-backend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DJANGO_ENV: production
      DJANGO_PRODUCTION: "true"
      DJANGO_DB_ENGINE: postgres
      DJANGO_CACHE_BACKEND: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      target: runner
    container_name: ccr-frontend-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_PROXY: "0"
      NEXT_PUBLIC_API_BASE_URL: /api
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: ccr-nginx-prod
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - backend_media:/app/media:ro
      - backend_static:/app/staticfiles:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  backend_media:
  backend_static:
